; AutoGauge firmware — ESP32 DevKitC/DOIT (30-pin), replaces the Raspberry Pi.
;
; default_envs matters: with two [env:] sections, a bare `pio run` (or
; `-t upload`) with no -e builds/flashes BOTH in sequence — whichever ran
; last wins on the actual board. Pin it to the real app so that's never an
; accident; use `-e diag` explicitly for the bring-up diagnostic.
[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Two OTA app slots (ota_0/ota_1, ~1.9MB each — our image is ~975KB, plenty
; of headroom to grow) so the OTA updater has an inactive slot to flash
; into and the bootloader can fall back to the previously-working slot if
; the new image never comes up cleanly. The small leftover spiffs/coredump
; partitions aren't used for anything; they're just what's left in this
; stock layout after the two app slots.
board_build.partitions = min_spiffs.csv

monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_src_filter = +<*> -<diag_main.cpp>

build_flags =
    -D LV_CONF_INCLUDE_SIMPLE
    -I include

; lvgl is vendored in lib/lvgl (not pulled via lib_deps) — the registry
; package's library.json has no srcFilter, so PlatformIO's LDF tries to
; compile every GPU/SIMD backend in the tree, including an ARM Helium .S
; file that the Xtensa assembler can't handle at all. That one file was
; deleted (emptied, to keep lvgl.h's unconditional #include valid) from
; the vendored copy; everything else was left intact since plain .c/.h
; files for irrelevant backends compile down to empty translation units
; via their own LV_USE_* guards.
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.2

; Hardware bring-up diagnostic — solid color fills + raw touch ADC dump,
; with no LVGL/app logic involved, so a wiring/driver bug can be told
; apart from an LVGL-level bug. Flash with: pio run -e diag -t upload
[env:diag]
platform = espressif32
board = esp32dev
framework = arduino
build_src_filter = +<diag_main.cpp> -<main.cpp>
board_build.partitions = huge_app.csv
monitor_speed = 115200
build_flags =
    -I include
